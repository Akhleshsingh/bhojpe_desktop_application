appId: com.BhojPe.desktop
productName: BhojPe
directories:
  output: dist-electron
  buildResources: build

files:
  - "dist/**/*"
  - "main.cjs"
  - "preload.cjs"
  - "package.json"

# Windows configuration
# To use a custom icon, place a 256x256 PNG or .ico file at build/icon.ico
# and uncomment: icon: build/icon.ico
win:
  target: nsis
  forceCodeSigning: false
  requestedExecutionLevel: asInvoker
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false

# macOS configuration
mac:
  target: dmg

# Linux configuration
linux:
  target: AppImage
  category: Utility
  synopsis: "BhojPe - Restaurant POS Desktop Application"
