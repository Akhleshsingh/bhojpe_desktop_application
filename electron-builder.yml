appId: com.BhojPe.desktop
productName: BhojPe
directories:
  output: dist-electron
  buildResources: build

files:
  - "dist/**/*"
  - "main.cjs"
  - "preload.cjs"
  - "package.json"

# Windows configuration
win:
  target: nsis
  icon: public/2.svg
  forceCodeSigning: false
  requestedExecutionLevel: asInvoker
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false

# macOS configuration
mac:
  target: dmg

# Linux configuration
linux:
  target: AppImage
  category: Utility
  synopsis: "BhojPe - Restaurant POS Desktop Application"
